services:
  docmost:
    image: docmost/docmost:latest
    restart: unless-stopped
    ports:
      - "${DOCMOST_PORT:-3000}:3000"
    environment:
      - APP_URL=http://localhost:${DOCMOST_PORT:-3000}
      - APP_SECRET=changeme-generate-a-long-random-secret
      - DATABASE_URL=postgresql://docmost:docmost@postgres:5432/docmost?sslmode=disable
      - REDIS_URL=redis://redis:6379
    volumes:
      - docmost-data:/app/data/storage
    depends_on:
      - postgres
      - redis
    networks:
      - docmost_network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=docmost
      - POSTGRES_USER=docmost
      - POSTGRES_PASSWORD=docmost
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - docmost_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    networks:
      - docmost_network

volumes:
  docmost-data:
  postgres-data:
  redis-data:

networks:
  docmost_network:
    driver: bridge
