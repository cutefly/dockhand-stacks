services:
  jenkins: 
    image: jenkins/jenkins:${JENKINS_IMAGE_TAG}
    container_name: jenkins
    restart: unless-stopped
    user: jenkins
    privileged: true
    ports:
      - 8080:8080
      - 50000:50000
    volumes:     
      - ./volumes/jenkins:/var/jenkins_home
  jenkins-agent01:
    image: jenkins/ssh-agent
    container_name: agent01
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul
      - JENKINS_AGENT_SSH_PUBKEY=ssh-rsa  ssh-key-2024-07-08
    volumes:
      - ./volumes/agent01:/home/jenkins
      - /var/run/docker.sock:/var/run/docker.sock
      - $HOME/.m2:/home/jenkins/.m2
  jenkins-agent02:
    image: jenkins/ssh-agent
    container_name: agent02
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul
      - JENKINS_AGENT_SSH_PUBKEY=ssh-rsa  ssh-key-2024-07-08
    volumes:
      - ./volumes/agent02:/home/jenkins
      - /var/run/docker.sock:/var/run/docker.sock
      - $HOME/.m2:/home/jenkins/.m2
